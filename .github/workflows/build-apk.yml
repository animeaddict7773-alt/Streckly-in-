name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - run: npm install
      - run: npx vite build
        env:
          CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL }}
      - run: npx cap add android
        continue-on-error: true
      - run: npx cap sync android
        env:
          CAPACITOR_SERVER_URL: ${{ secrets.CAPACITOR_SERVER_URL }}
      - name: Inject AdMob
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          sed -i 's|</application>|    <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-6278223211027037~4332224410"/>\n    </application>|' "$MANIFEST"
      - run: cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: streakly-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
